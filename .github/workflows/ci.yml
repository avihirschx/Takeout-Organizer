name: tests

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install ExifTool (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libimage-exiftool-perl

      - name: Install ExifTool (macOS)
        if: runner.os == 'macOS'
        run: brew install exiftool

      - name: Install ExifTool (Windows)
        if: runner.os == 'Windows'
        run: choco install exiftool --no-progress -y

      # neardup pulls in Pillow + pillow-heif so the perceptual-hash and parallel
      # fingerprinting tests actually run (instead of being skipped).
      - name: Install package + dev/neardup deps
        run: pip install -e ".[dev,neardup]"

      - name: Show tool versions
        run: |
          python --version
          exiftool -ver

      - name: Run tests
        run: pytest -q
